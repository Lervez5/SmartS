services:
  mongodb:
    image: mongo:6
    restart: unless-stopped
    command: ["--replSet", "rs0"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

  mongo-init:
    image: mongo:6
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      mongosh --host mongodb:27017 --eval
      "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: ["npm", "dev"]
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/SmartS?replicaSet=rs0"
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"

  ai_engine:
    build: ./ai_engine
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5000", "--reload"]
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"

  frontend-kids:
    build: ./frontend-kids
    command: ["npm", "dev"]
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongodb_data: