version: "3.9"

services:
  mongodb:
    image: mongo:6
    restart: unless-stopped
    command: ["--replSet", "rs0"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      start_interval: 2s
      retries: 3

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: ["pnpm", "dev"]
    environment:
      DATABASE_URL: mongodb://root:example@mongodb:27017/smartsprout?authSource=admin
      NODE_ENV: development
    depends_on:
      - mongodb
    ports:
      - "4000:4000"

  ai_engine:
    build: ./ai_engine
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5000", "--reload"]
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"

  frontend-kids:
    build: ./frontend-kids
    command: ["pnpm", "dev"]
    depends_on:
      - backend
    ports:
      - "3000:3000"

  frontend-admin:
    build: ./frontend-admin
    command: ["pnpm", "dev", "--", "--port", "3001"]
    depends_on:
      - backend
    ports:
      - "3001:3001"

volumes:
  mongodb_data:


